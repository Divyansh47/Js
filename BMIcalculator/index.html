<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../styles.css" />
    <title>BMI CALCULATOR</title>
</head>
<body>
   <div class="container">
    <h1>BMI Calculator</h1>
    <form>
    <p><label>height in CM: </label><input
    type="text" id="height" /></p>
    <p><label>weight in KG: </label><input
    type="text" id="weight" /></p>
    <button>Calculate</button>
    <div id="result"></div>
    <div id="weight-guide">
        <h3>BMI Weight Guide</h3>
        <p>Under weight= less than 18.6</p>
        <p>Normal weight= 18.6 and 24.9</p>
        <p>Over weight= More than 24.9</p>
    </div>
    </form>
   </div>
</body>
<script src="BMI_calculator.js"></script>
</html>
